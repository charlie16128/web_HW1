<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D1349111 - 當機救星</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img id="logo" src="./Picture/logo_transparent_background.png" alt="Bouncing Logo">

    <div class="search-box">
        <input type="text" placeholder="搜尋">
        <button class="search-btn">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="white" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
    </div>

    <div class="loading-container">
        <div class="error-details">
            <p id="message">
                Youtube 目前無法連線<br>請稍後再試...
            </p>
        </div>

        <div class="loading-spinner"></div>

        <div class="progress-bar">
            <div class="block"></div><div class="block"></div><div class="block"></div>
            <div class="block"></div><div class="block"></div><div class="block"></div>
            <div class="block"></div><div class="block"></div><div class="block"></div>
            <div class="block"></div>
        </div>
        
        <p id="loading-text">等待重試...10s</p>
    </div>

    <div class="video-grid">
        <div class="video-card">
            <div class="video-blackscreen"></div>
            <div class="video-title"></div>
            <div class="video-viewcount">觀看次數 : D1349111</div>
        </div>
        <div class="video-card">
            <div class="video-blackscreen"></div>
            <div class="video-title"></div>
            <div class="video-viewcount">觀看次數 : 資訊二乙</div>
        </div>
        <div class="video-card">
            <div class="video-blackscreen"></div>
            <div class="video-title"></div>
            <div class="video-viewcount">觀看次數 : 杜瀚翔</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
